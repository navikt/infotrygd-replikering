app:
  frontend:
    path: "frontend/build"
  gruppe:
    admin: "gruppe-admin"
  tilganger:
    testtabeller: default

server:
  port: 12398
spring:
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    url: jdbc:oracle:thin:@localhost:1521:XE
    hikari:
      schema: test
  sql:
    init:
      mode: always
#      platform: postgresql

audit:
  syslog:
    host: localhost
    port: 16515

management:
  endpoint:
    health:
      show-details: ALWAYS
  endpoints:
    web:
      exposure:
        include: health,info

no.nav.security.jwt:
  issuer:
    azure:
      proxyurl: ~


AZURE_APP_WELL_KNOWN_URL: "http://localhost:${mock-oauth2-server.port}/issuer1/.well-known/openid-configuration"
AZURE_OPENID_CONFIG_TOKEN_ENDPOINT: "http://localhost:${mock-oauth2-server.port}/issuer1/token"
AZURE_APP_CLIENT_ID: "aud-localhost"
AZURE_APP_JWK: "src/test/resources/jwk.json"
APP_DEFAULT_SCHEMA: "test"

vault:
  password: "src/test/resources/vault/password"
  username: "src/test/resources/vault/username"
