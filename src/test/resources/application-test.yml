app:
  frontend:
    path: "frontend/build"
  gruppe:
    admin: "gruppe-admin"
  tilganger:
    testtabeller: default

server:
  port: 12398
spring:
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    hikari:
      schema: test
  sql:
    init:
      mode: always
#      platform: postgresql
pdl:
  url: "http://localhost:12398/stubs/pdl"
  scopes: "pdl"

audit:
  syslog:
    host: localhost
    port: 16515

no.nav.security.jwt:
  expirythreshold: 60 #threshold in minutes until token expires
  issuer:
    azure:
      discoveryurl: http://localhost:${mock-oauth2-server.port}/issuer1/.well-known/openid-configuration
      accepted_audience: aud-localhost
      proxyurl: ~
