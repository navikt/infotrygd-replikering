query($ident: ID!) {
    hentPerson(ident: $ident) {
        navn(historikk: false) {
            fornavn, mellomnavn, etternavn
        },
        doedsfall{
            doedsdato,
            metadata {
                master,
                endringer {
                    kilde,
                    registrert,
                    type
                }
            }
        }
        adressebeskyttelse(historikk: false) {
            gradering
        }
    },
    hentIdenter(ident: $ident, grupper: [FOLKEREGISTERIDENT], historikk: true) {
        identer {
            ident,
            gruppe,
            historisk
        },
    }
}