name: master

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v1
        with:
          java-version: '17.x'

      - name: Set cache key
        run: |
          echo "CACHE_KEY=$(expr $(date +%V))" >> $GITHUB_ENV
          echo "TIMESTAMP=$(expr $(date +%Y%m%d%H%M%S))" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ env.CACHE_KEY }}

      - name: Build artifacts
        run: mvn verify

      - name: Bygg og push docker image til GAR
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: historisk

      - name: Deploy back-end til dev-fss
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-fss
          RESOURCE: nais/app/backend.yaml
          VARS: nais/dev.json
          VAR: image=${{ steps.docker-build-push.outputs.image  }}

      - name: Deploy back-end til prod-fss
        if: github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, 'ci skip')
        uses: nais/deploy/actions/deploy@v2
        env:
          APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY }}
          CLUSTER: prod-fss
          RESOURCE: nais/app/backend.yaml
          VARS: nais/prod.json
          VAR: image=${{ steps.docker-build-push.outputs.image  }}
